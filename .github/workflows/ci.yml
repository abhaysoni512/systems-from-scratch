
name: CI

on:

  push:

    branches: [ main, dev/* ]

  pull_request:

    branches: [ main ]

jobs:

  build:

    name: Build & Test (${{ matrix.compiler }})

    runs-on: ubuntu-24.04

    strategy:

      matrix:

        compiler: [gcc, clang]

    steps:

      - name: Checkout

        uses: actions/checkout@v4

      - name: Install dependencies

        run: |

          sudo apt-get update -qq

          sudo apt-get install -y \

            libpcap-dev \

            valgrind \

            clang \

            cmake

      - name: Build with sanitizers (${{ matrix.compiler }})

        run: |

          for dir in 0*/; do

            if [ -f "$dir/Makefile" ]; then

              echo "=== Building $dir ==="

              make -C "$dir" CC=${{ matrix.compiler }} \

                CFLAGS="-fsanitize=address,undefined -g -Wall -Wextra"

            fi

          done

      - name: Run tests

        run: |

          for dir in 0*/; do

            if [ -f "$dir/Makefile" ]; then

              make -C "$dir" test 2>/dev/null || true

            fi

          done

      - name: Valgrind check (gcc only)

        if: matrix.compiler == 'gcc'

        run: |

          if [ -f "01-memory-allocator/Makefile" ]; then

            make -C 01-memory-allocator valgrind

          fi

